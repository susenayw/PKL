<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register - Sistem Integrasi BKU & SPJ</title>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-gold: #dfa526;
            --text-dark: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url('pictures/homepage\ background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            margin: 0;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 32, 67, 0.8), rgba(30, 58, 138, 0.6));
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border-top: 6px solid var(--accent-gold);
            transition: height 0.3s ease;
        }

        .login-header {
            background-color: rgba(30, 58, 138, 0.95);
            color: white;
            padding: 30px 25px 25px 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-header h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 13px;
            opacity: 0.85;
        }

        .login-form {
            padding: 30px 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.15);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-blue), #1d4ed8);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-register {
            background: linear-gradient(135deg, #047857, #059669);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            display: none; 
        }

        .toggle-link {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: var(--primary-blue);
            cursor: pointer;
            font-weight: 600;
        }
        
        .toggle-link:hover {
            text-decoration: underline;
        }

        .pesan-sistem {
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .error { background-color: #fef2f2; color: #b91c1c; border-left: 4px solid #ef4444; }
        .sukses { background-color: #f0fdf4; color: #15803d; border-left: 4px solid #22c55e; }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="login-container">
        <div class="login-header">
            <h2>DISKOMINFO SUMUT</h2>
            <p id="teksHeader">Sistem Integrasi BKU & SPJ Belanja</p>
        </div>
        
        <div class="login-form">
            <div id="pesanNotif" class="pesan-sistem"></div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan password">
            </div>

            <button type="button" id="btnLogin" class="btn-login">Masuk ke Sistem</button>
            <button type="button" id="btnRegister" class="btn-register">Daftarkan Akun Baru</button>

            <div class="toggle-link" id="toggleMode">Belum punya akun? Daftar di sini</div>
        </div>
    </div>

    <script>
        let isModeLogin = true; 
        const judulHeader = document.getElementById('teksHeader');
        const btnLogin = document.getElementById('btnLogin');
        const btnRegister = document.getElementById('btnRegister');
        const toggleMode = document.getElementById('toggleMode');
        const pesanNotif = document.getElementById('pesanNotif');
        const inputUser = document.getElementById('username');
        const inputPass = document.getElementById('password');

        function tampilkanPesan(pesan, tipe) {
            pesanNotif.textContent = pesan;
            pesanNotif.className = `pesan-sistem ${tipe}`;
            pesanNotif.style.display = 'block';
        }

        toggleMode.addEventListener('click', function() {
            isModeLogin = !isModeLogin; 
            pesanNotif.style.display = 'none'; 
            inputUser.value = ''; inputPass.value = ''; 

            if (isModeLogin) {
                judulHeader.textContent = "Sistem Integrasi BKU & SPJ Belanja";
                btnLogin.style.display = 'block';
                btnRegister.style.display = 'none';
                toggleMode.textContent = "Belum punya akun? Daftar di sini";
            } else {
                judulHeader.textContent = "Pendaftaran Akun Baru";
                btnLogin.style.display = 'none';
                btnRegister.style.display = 'block';
                toggleMode.textContent = "Sudah punya akun? Kembali ke Login";
            }
        });

        btnRegister.addEventListener('click', function() {
            const user = inputUser.value.trim();
            const pass = inputPass.value.trim();

            if (user === '' || pass === '') {
                tampilkanPesan("Username dan Password tidak boleh kosong!", "error");
                return;
            }

            const dataAkun = { username: user, password: pass };
            localStorage.setItem('akun_diskominfo', JSON.stringify(dataAkun));
            tampilkanPesan("Akun berhasil didaftarkan! Silakan klik 'Kembali ke Login'.", "sukses");
        });

        btnLogin.addEventListener('click', function() {
            const user = inputUser.value.trim();
            const pass = inputPass.value.trim();

            const akunTersimpan = JSON.parse(localStorage.getItem('akun_diskominfo'));

            if (!akunTersimpan) {
                tampilkanPesan("Belum ada akun yang terdaftar. Silakan daftar dulu!", "error");
                return;
            }

            if (user === akunTersimpan.username && pass === akunTersimpan.password) {
                pesanNotif.style.display = 'none';
                
                // [MERGE UPGRADE]: Set Session Storage agar Main App tahu user sudah login resmi
                sessionStorage.setItem('sesi_login_diskominfo', 'aktif');
                
                window.location.assign('index.html');
            } else {
                tampilkanPesan("Username atau Password salah!", "error");
            }
        });
    </script>

</body>
</html>
